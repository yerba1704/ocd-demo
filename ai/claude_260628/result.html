<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>APEX_CSS_MODIFIED</title>
<style>
  :root{
    --oracle-red:#ee0000;
    --link-blue:#0572ce;
    --link-visited:#7a3ea1;
    --text:#312d2a;
    --text-light:#5a5552;
    --bg:#ffffff;
    --sidebar-bg:#fafafa;
    --sidebar-border:#e1e1e1;
    --code-bg:#f5f5f5;
    --code-border:#e0e0e0;
    --table-border:#e1e1e1;
    --table-head-bg:#f7f7f7;
    --serif:"Palatino Linotype","Book Antiqua",Georgia,"Times New Roman",serif;
    --sans:Arial,Helvetica,"Segoe UI",sans-serif;
    --mono:"Consolas","Menlo","Monaco","Courier New",monospace;
  }

  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    font-family:var(--sans);
    color:var(--text);
    background:var(--bg);
    font-size:14px;
    line-height:1.6;
  }
  a{color:var(--link-blue); text-decoration:none;}
  a:hover{text-decoration:underline;}
  a:visited{color:var(--link-visited);}

  /* ===== Top bar ===== */
  .topbar{
    background:#312d2a;
    color:#fff;
    padding:10px 20px;
    display:flex;
    align-items:center;
    justify-content:space-between;
    font-size:13px;
  }
  .topbar .brand{
    font-weight:bold;
    letter-spacing:.5px;
  }
  .topbar .brand span{color:var(--oracle-red);}
  .topbar .crumbs{color:#cfc9c4; font-size:12px;}
  .topbar .crumbs a{color:#cfc9c4;}

  .titlebar{
    border-bottom:1px solid var(--sidebar-border);
    padding:14px 24px;
    background:#fff;
  }
  .titlebar h1{
    font-family:var(--serif);
    font-size:22px;
    margin:0;
    color:var(--text);
  }
  .titlebar .subtitle{
    color:var(--text-light);
    font-size:12.5px;
    margin-top:4px;
  }

  /* ===== Layout ===== */
  .layout{
    display:flex;
    min-height:calc(100vh - 110px);
  }

  /* ===== Sidebar ===== */
  .sidebar{
    width:300px;
    flex-shrink:0;
    background:var(--sidebar-bg);
    border-right:1px solid var(--sidebar-border);
    padding:18px 0 40px 0;
    overflow-y:auto;
  }
  .sidebar .search-box{
    margin:0 16px 16px 16px;
  }
  .sidebar .search-box input{
    width:100%;
    padding:7px 10px;
    border:1px solid #cfcac6;
    border-radius:3px;
    font-size:13px;
    font-family:var(--sans);
  }
  .sidebar h2{
    font-size:11px;
    text-transform:uppercase;
    letter-spacing:.6px;
    color:var(--text-light);
    margin:0 16px 8px 16px;
    font-weight:bold;
  }
  .nav-list{
    list-style:none;
    margin:0;
    padding:0;
  }
  .nav-list > li > a{
    display:block;
    padding:6px 16px;
    color:var(--text);
    font-weight:bold;
    border-left:3px solid transparent;
  }
  .nav-list > li > a:hover{
    background:#f0eeec;
    text-decoration:none;
  }
  .nav-list > li.active > a{
    background:#fdeeee;
    border-left-color:var(--oracle-red);
    color:var(--oracle-red);
  }
  .sub-nav{
    list-style:none;
    margin:0;
    padding:0 0 6px 0;
  }
  .sub-nav li a{
    display:block;
    padding:5px 16px 5px 32px;
    color:var(--link-blue);
    font-size:13px;
    font-weight:normal;
    border-left:3px solid transparent;
  }
  .sub-nav li a:hover{
    background:#f0eeec;
    text-decoration:none;
  }
  .sub-nav li.active a{
    background:#fdeeee;
    border-left-color:var(--oracle-red);
    color:var(--oracle-red);
    font-weight:bold;
  }
  .nav-tag{
    display:inline-block;
    font-size:10px;
    font-weight:bold;
    color:#9a6b00;
    background:#fff3da;
    border:1px solid #f0d99a;
    border-radius:3px;
    padding:0 4px;
    margin-left:6px;
    vertical-align:middle;
  }

  /* ===== Main content ===== */
  .content{
    flex:1;
    padding:28px 40px 60px 40px;
    max-width:880px;
  }
  .content .pkg-desc{
    font-size:14.5px;
    color:var(--text);
    margin-bottom:28px;
    max-width:760px;
  }
  .toc-box{
    border:1px solid var(--sidebar-border);
    background:#fafafa;
    padding:14px 20px;
    margin-bottom:30px;
    border-radius:3px;
  }
  .toc-box h3{
    margin:0 0 8px 0;
    font-size:13px;
    text-transform:uppercase;
    letter-spacing:.5px;
    color:var(--text-light);
  }
  .toc-box ul{margin:0; padding-left:18px;}
  .toc-box li{margin:4px 0;}

  .section{
    display:none;
  }
  .section.active{
    display:block;
  }

  .section .crumbline{
    font-size:12px;
    color:var(--text-light);
    margin-bottom:6px;
  }
  .section h2{
    font-family:var(--serif);
    font-size:21px;
    color:var(--text);
    border-bottom:1px solid var(--sidebar-border);
    padding-bottom:10px;
    margin-top:0;
    margin-bottom:18px;
  }
  .section h2 .num{
    color:var(--text-light);
    font-weight:normal;
    margin-right:8px;
  }
  .deprecated-badge{
    display:inline-block;
    font-size:11px;
    font-weight:bold;
    color:#9a3b00;
    background:#ffe9da;
    border:1px solid #f0b88f;
    border-radius:3px;
    padding:1px 6px;
    margin-left:8px;
    vertical-align:middle;
  }
  .section .desc-text{
    margin-bottom:22px;
    max-width:760px;
  }
  .section .desc-text p{margin:0 0 10px 0;}

  .block-label{
    font-size:13px;
    font-weight:bold;
    color:var(--text);
    margin:26px 0 10px 0;
    padding-bottom:4px;
  }

  pre.codeblock{
    background:var(--code-bg);
    border:1px solid var(--code-border);
    border-radius:3px;
    padding:14px 18px;
    overflow-x:auto;
    font-family:var(--mono);
    font-size:13px;
    line-height:1.55;
    color:#2b2b2b;
    margin:0 0 8px 0;
  }
  pre.codeblock .kw{color:#0572ce;}
  pre.codeblock .ty{color:#7a3ea1;}
  pre.codeblock .cm{color:#6a9955; font-style:italic;}

  table.param-table{
    width:100%;
    border-collapse:collapse;
    margin-bottom:10px;
    font-size:13.5px;
  }
  table.param-table th{
    background:var(--table-head-bg);
    text-align:left;
    padding:8px 14px;
    border:1px solid var(--table-border);
    font-weight:bold;
    color:var(--text);
  }
  table.param-table td{
    padding:8px 14px;
    border:1px solid var(--table-border);
    vertical-align:top;
  }
  table.param-table td:first-child{
    font-family:var(--mono);
    white-space:nowrap;
    color:var(--text);
    font-weight:bold;
    width:1%;
  }
  table.param-table tr:nth-child(even) td{
    background:#fcfcfc;
  }
  code, .inline-code{
    font-family:var(--mono);
    background:var(--code-bg);
    border:1px solid var(--code-border);
    border-radius:3px;
    padding:1px 5px;
    font-size:12.5px;
  }
  .example-block{margin-bottom:22px;}
  .example-block .ex-title{
    font-size:13px;
    font-weight:bold;
    margin-bottom:8px;
  }
  .empty-note{
    color:var(--text-light);
    font-style:italic;
    font-size:13px;
  }
  .parent-topic{
    margin-top:36px;
    padding-top:14px;
    border-top:1px solid var(--sidebar-border);
    font-size:13px;
    color:var(--text-light);
  }
  .parent-topic strong{color:var(--text);}

  .pager{
    display:flex;
    justify-content:space-between;
    margin-top:30px;
    font-size:13px;
  }
  .pager span.disabled{color:#bbb;}

  /* type badges in sidebar */
  .type-chip{
    font-size:10px;
    font-weight:bold;
    border-radius:3px;
    padding:0 4px;
    margin-right:6px;
    vertical-align:middle;
  }
  .type-chip.proc{background:#e7f0fb; color:#0a5ca8;}
  .type-chip.func{background:#eaf7ec; color:#1c7a30;}
  .type-chip.const{background:#f3eefb; color:#6a36a8;}

  @media (max-width: 820px){
    .layout{flex-direction:column;}
    .sidebar{width:100%; border-right:none; border-bottom:1px solid var(--sidebar-border);}
    .content{padding:20px;}
  }
</style>
</head>

<div class="topbar">

  <div class="crumbs"><a href="#" onclick="return false;">Database</a> &nbsp;›&nbsp; <a href="#" onclick="return false;">Oracle APEX</a> &nbsp;›&nbsp; 24.2 &nbsp;›&nbsp; AEAPI</div>
</div>

<div class="titlebar">
  <h1 id="page-title">APEX_CSS_MODIFIED</h1>
  <div class="subtitle">Oracle® APEX API Reference — Release 24.2 — Modified Edition</div>
</div>

<div class="layout">

  <!-- ===================== SIDEBAR ===================== -->
  <nav class="sidebar" id="sidebar">
    <div class="search-box">
      <input type="text" id="navSearch" placeholder="Search package contents…" oninput="filterNav()">
    </div>
    <h2>Package</h2>
    <ul class="nav-list">
      <li class="active" id="nav-overview">
        <a href="#" onclick="showSection('overview'); return false;">APEX_CSS_MODIFIED</a>
        <ul class="sub-nav" id="subnav"></ul>
      </li>
    </ul>
  </nav>

  <!-- ===================== CONTENT ===================== -->
  <main class="content" id="content">

    <!-- Overview section -->
    <section class="section active" id="sec-overview">
      <div class="crumbline">17&nbsp; APEX_CSS_MODIFIED</div>

        <ul id="overview-toc"></ul>
      </div>

    <div id="component-sections"></div>

</div>

<script>
const DATA = {
  "name" : "APEX_CSS_MODIFIED",
  "desc" : "The APEX_CSS package provides utility functions for adding CSS styles to HTTP output. This package is usually used for plug-in development.",
  "components" :
  [
    {
      "name" : "C_LIBRARY_JQUERY",
      "type" : "CONSTANT",
      "desc" : "Constant for jquery-ui. Internal use."
    },
    {
      "name" : "C_LIBRARY_JQUERY_UI",
      "type" : "CONSTANT",
      "desc" : "Constant for jquery-ui. Internal use."
    },
    {
      "name" : "ADD_FILE",
      "type" : "PROCEDURE",
      "desc" : "This procedure adds the link tag to load a CSS library. If a library has already been added, it will not be added a second time.",
      "syntax" : "procedure add_file(\n    p_name           in varchar2,\n    p_directory      in varchar2,\n    p_version        in varchar2,\n    p_skip_extension in boolean,\n    p_media_query    in varchar2,\n    p_ie_condition   in varchar2,\n    p_attributes     in varchar2,\n    p_key            in varchar2);",
      "parameters" :
      [
        { "name" : "P_NAME", "desc" : "Name of the CSS file." },
        { "name" : "P_DIRECTORY", "desc" : "Begin of the URL where the CSS file should be read from. If you use this function for a plug-in you should set this parameter to `p_plugin.file_prefix`." },
        { "name" : "P_VERSION", "desc" : "Identifier of the version of the CSS file. The version will be  added to the CSS filename. In most cases you should use the default of NULL as the value." },
        { "name" : "P_SKIP_EXTENSION", "desc" : "The function automatically adds `.css` to the CSS filename. If set to `TRUE`, the function ignores this addition." },
        { "name" : "P_MEDIA_QUERY", "desc" : "Value set as media query." },
        { "name" : "P_IE_CONDITION", "desc" : "(Desupported) Condition used as Internet Explorer condition." },
        { "name" : "P_ATTRIBUTES", "desc" : "Extra attributes to add to the link tag. NOTE: Callers are responsible for escaping this parameter." },
        { "name" : "P_KEY", "desc" : null }
      ],
      "examples" :
      [
        {
          "name" : "EXAMPLE_1",
          "code" : "begin\n-- Adds the CSS file `jquery.autocomplete.css` in the directory specified by\n-- `p_plugin.file_prefix` to the HTML output of the page and makes sure that\n-- it will only be included once if `APEX_CSS.ADD_FILE` is called multiple times\n-- with that name.\n  apex_css.add_file (\n      p_name      => 'jquery.autocomplete',\n      p_directory => p_plugin.file_prefix );\nend;"
        }
      ]
    },
    {
      "name" : "ADD_3RD_PARTY_LIBRARY_FILE",
      "type" : "PROCEDURE",
      "desc" : "This procedure adds the link tag to load a 3rd party CSS file and also takes into account the specified Content Delivery Network (CDN) for the application.\n\nSupported libraries include: - jQuery - jQueryUI\n\nIf a library has already been added, it is not added a second time.",
      "syntax" : "procedure add_3rd_party_library_file(\n    p_library     in varchar2,\n    p_file_name   in varchar2,\n    p_directory   in varchar2,\n    p_version     in varchar2,\n    p_media_query in varchar2,\n    p_attributes  in varchar2);",
      "parameters" :
      [
        { "name" : "P_LIBRARY", "desc" : "Use one of the `c_library_*` constants" },
        { "name" : "P_FILE_NAME", "desc" : "Specifies the file name without version, `.min` and `.css` If no file name is provided, the default library file will be loaded." },
        { "name" : "P_DIRECTORY", "desc" : "Directory where the file P_FILE_NAME is located." },
        { "name" : "P_VERSION", "desc" : "If no value is provided, then uses the same version shipped with APEX." },
        { "name" : "P_MEDIA_QUERY", "desc" : "Value that is set as media query." },
        { "name" : "P_ATTRIBUTES", "desc" : "Extra attributes to add to the link tag. Note: Callers are responsible for escaping this parameter." }
      ],
      "examples" :
      [
        {
          "name" : "EXAMPLE_1",
          "code" : "-- The following example loads the CSS file of the Accordion\n-- component of the jQuery UI.\nbegin\n  apex_css.add_3rd_party_library_file (\n    p_library   => apex_css.c_library_jquery_ui,\n    p_file_name => 'jquery.ui.accordion' );\nend;"
        }
      ]
    },
    {
      "name" : "ADD",
      "type" : "PROCEDURE",
      "desc" : "This procedure adds a CSS style snippet that is included inline in the HTML output. Use this procedure to add new CSS style declarations.",
      "syntax" : "procedure add(\n    p_css in varchar2,\n    p_key in varchar2);",
      "parameters" :
      [
        { "name" : "P_CSS", "desc" : "The CSS style snippet. For example, `#test {color:#fff}`" },
        { "name" : "P_KEY", "desc" : "Identifier for the style snippet. If specified and a style snippet with the same name has already been added the new style snippet will be ignored." }
      ],
      "examples" :
      [
        {
          "name" : "EXAMPLE_1",
          "code" : "-- Adds an inline CSS definition for the class autocomplete into the HTML page.\n-- The key `autocomplete_widget` prevents the definition from being included another\n-- time if the `apex_css.add` is called another time.\nbegin\n  apex_css.add (\n    p_css => '.autocomplete { color:#ffffff }',\n    p_key => 'autocomplete_widget' );\nend;"
        }
      ]
    },
    {
      "name" : "NEW_CSS_REPOSITORY_RECORD",
      "type" : "FUNCTION",
      "desc" : "Use WWV_FLOW_API.CREATE_APP_STATIC_FILE and WWV_FLOW_API.CREATE_WORKSPACE_STATIC_FILE instead.",
      "syntax" : "function new_css_repository_record(\n    p_name           in/out varchar2,\n    p_varchar2_table in dbms_sql.varchar2_table,\n    p_mimetype       in varchar2,\n    p_flow_id        in number,\n    p_notes          in varchar2);",
      "parameters" :
      [
        { "name" : "P_NAME", "desc" : null },
        { "name" : "P_VARCHAR2_TABLE", "desc" : null },
        { "name" : "P_MIMETYPE", "desc" : null },
        { "name" : "P_FLOW_ID", "desc" : null },
        { "name" : "P_NOTES", "desc" : null }
      ]
    },
    {
      "name" : "REMOVE_CSS",
      "type" : "PROCEDURE",
      "syntax" : "procedure remove_css(\n    p_css_name in varchar2,\n    p_flow_id  in number);",
      "parameters" :
      [
        { "name" : "P_CSS_NAME", "desc" : null },
        { "name" : "P_FLOW_ID", "desc" : null }
      ]
    }
  ]
};

function escapeHtml(str){
  if(str === null || str === undefined) return '';
  return str
    .replace(/&/g,'&amp;')
    .replace(/</g,'&lt;')
    .replace(/>/g,'&gt;');
}

// Convert simple markdown-ish backticks to <code> and paragraphs
function renderDesc(text){
  if(!text) return '<p class="empty-note">No description available.</p>';
  const paragraphs = text.split(/\n\n+/);
  return paragraphs.map(p => {
    let escaped = escapeHtml(p);
    escaped = escaped.replace(/`([^`]+)`/g, '<code>$1</code>');
    escaped = escaped.replace(/\n/g, '<br>');
    return '<p>' + escaped + '</p>';
  }).join('');
}

function highlightSyntax(code){
  let html = escapeHtml(code);
  // highlight keywords
  html = html.replace(/\b(procedure|function|begin|end|in|out|return)\b/g, '<span class="kw">$1</span>');
  html = html.replace(/\b(varchar2|boolean|number|dbms_sql\.varchar2_table)\b/g, '<span class="ty">$1</span>');
  return html;
}

function highlightCode(code){
  let html = escapeHtml(code);
  html = html.replace(/(--[^\n]*)/g, '<span class="cm">$1</span>');
  return html;
}

function typeChipClass(type){
  if(type === 'PROCEDURE') return 'proc';
  if(type === 'FUNCTION') return 'func';
  if(type === 'CONSTANT') return 'const';
  return '';
}
function typeChipLabel(type){
  if(type === 'PROCEDURE') return 'PROC';
  if(type === 'FUNCTION') return 'FUNC';
  if(type === 'CONSTANT') return 'CONST';
  return type;
}

function isDeprecated(comp){
  return /use .* instead/i.test(comp.desc || '') || comp.name === 'NEW_CSS_REPOSITORY_RECORD';
}

function buildNav(){
  const subnav = document.getElementById('subnav');
  const overviewToc = document.getElementById('overview-toc');
  let html = '';
  let tocHtml = '';

  DATA.components.forEach((comp, i) => {
    const chipClass = typeChipClass(comp.type);
    const chipLabel = typeChipLabel(comp.type);
    const deprecated = isDeprecated(comp);
    const idSafe = comp.name.toLowerCase();

    html += `<li id="navitem-${idSafe}">
      <a href="#" onclick="showSection('${idSafe}'); return false;">
        <span class="type-chip ${chipClass}">${chipLabel}</span>${comp.name}${deprecated ? '<span class="nav-tag">DEPRECATED</span>' : ''}
      </a>
    </li>`;

    tocHtml += `<li><a href="#" onclick="showSection('${idSafe}'); return false;"><strong>${comp.name}</strong></a> &mdash; ${comp.type}${deprecated ? ' <span class="nav-tag">DEPRECATED</span>' : ''}</li>`;
  });

  subnav.innerHTML = html;
  overviewToc.innerHTML = tocHtml;
}

function buildOverviewDesc(){
  document.getElementById('overview-desc').innerHTML = renderDesc(DATA.desc);
}

function buildSections(){
  const container = document.getElementById('component-sections');
  let html = '';

  DATA.components.forEach((comp, i) => {
    const idSafe = comp.name.toLowerCase();
    const sectionNum = `17.${i+1}`;
    const deprecated = isDeprecated(comp);
    const typeLabelMap = { PROCEDURE: 'Procedure', FUNCTION: 'Function', CONSTANT: 'Constant' };
    const typeLabel = typeLabelMap[comp.type] || comp.type;

    let body = '';

    if(comp.type === 'CONSTANT'){
      body += `<div class="block-label">Description</div>`;
      body += `<div class="desc-text">${renderDesc(comp.desc)}</div>`;
    } else {
      body += `<div class="desc-text">${renderDesc(comp.desc)}</div>`;

      if(comp.syntax){
        body += `<div class="block-label">Syntax</div>`;
        body += `<pre class="codeblock">${highlightSyntax(comp.syntax)}</pre>`;
      }

      if(comp.parameters && comp.parameters.length){
        body += `<div class="block-label">Parameters</div>`;
        body += `<table class="param-table"><thead><tr><th>Parameter</th><th>Description</th></tr></thead><tbody>`;
        comp.parameters.forEach(p => {
          const pdesc = p.desc ? renderDesc(p.desc) : '<span class="empty-note">No description available.</span>';
          body += `<tr><td>${escapeHtml(p.name.toLowerCase())}</td><td>${pdesc}</td></tr>`;
        });
        body += `</tbody></table>`;
      }

      if(comp.examples && comp.examples.length){
        body += `<div class="block-label">${comp.examples.length > 1 ? 'Examples' : 'Example'}</div>`;
        comp.examples.forEach((ex, exi) => {
          body += `<div class="example-block">
            <pre class="codeblock">${highlightCode(ex.code)}</pre>
          </div>`;
        });
      }
    }

    const prevComp = i > 0 ? DATA.components[i-1] : null;
    const nextComp = i < DATA.components.length - 1 ? DATA.components[i+1] : null;

    html += `<section class="section" id="sec-${idSafe}">
      <div class="crumbline">${sectionNum}&nbsp; ${comp.name} ${typeLabel}</div>
      <h2><span class="num">${sectionNum}</span>${comp.name} ${typeLabel}${deprecated ? '<span class="deprecated-badge">DEPRECATED</span>' : ''}</h2>
      ${body}
      <div class="parent-topic">Parent topic: <a href="#" onclick="showSection('overview'); return false;"><strong>APEX_CSS_MODIFIED</strong></a></div>
      <div class="pager">
        ${prevComp ? `<a href="#" onclick="showSection('${prevComp.name.toLowerCase()}'); return false;">&laquo; Previous: ${prevComp.name}</a>` : `<span class="disabled">&laquo; Previous</span>`}
        ${nextComp ? `<a href="#" onclick="showSection('${nextComp.name.toLowerCase()}'); return false;">Next: ${nextComp.name} &raquo;</a>` : `<span class="disabled">Next &raquo;</span>`}
      </div>
    </section>`;
  });

  container.innerHTML = html;
}

function showSection(id){
  document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
  document.querySelectorAll('.nav-list > li').forEach(li => li.classList.remove('active'));
  document.querySelectorAll('.sub-nav li').forEach(li => li.classList.remove('active'));

  if(id === 'overview'){
    document.getElementById('sec-overview').classList.add('active');
    document.getElementById('nav-overview').classList.add('active');
    document.getElementById('page-title').textContent = 'APEX_CSS_MODIFIED';
  } else {
    const sec = document.getElementById('sec-' + id);
    if(sec){
      sec.classList.add('active');
      document.getElementById('nav-overview').classList.add('active');
      const navItem = document.getElementById('navitem-' + id);
      if(navItem) navItem.classList.add('active');
      const comp = DATA.components.find(c => c.name.toLowerCase() === id);
      document.getElementById('page-title').textContent = comp ? comp.name + ' ' + (comp.type.charAt(0) + comp.type.slice(1).toLowerCase()) : 'APEX_CSS_MODIFIED';
    }
  }
  window.scrollTo(0,0);
}

function filterNav(){
  const q = document.getElementById('navSearch').value.toLowerCase();
  document.querySelectorAll('#subnav > li').forEach(li => {
    const text = li.textContent.toLowerCase();
    li.style.display = text.includes(q) ? '' : 'none';
  });
}

buildNav();
buildOverviewDesc();
buildSections();
</script>
